app:
  name: 'yuki-proxy'
  group: default-app-group
  replicaCount: 4
  container:
    image: 406122784773.dkr.ecr.us-east-1.amazonaws.com/yuki-proxy:0.0.370
    port: 5162
    env:
      ASPNETCORE_ENVIRONMENT: Prod
      COMPUTE_HOST: https://prod.yukicomputing.com
      SYSTEM_HOST: https://prod.yukicomputing.com
      SERILOG_DATADOG_ENABLED: true
      PROXY_HOST:
      REDIS_HOST:
      HEALTH_CHECK_REDIS_TIMEOUT_MS: 200
      HEALTH_CHECK_SYSTEM_TIMEOUT_MS: 500
      HEALTH_CHECK_COMPUTE_TIMEOUT_MS: 500

# Additional environment variables from existing Kubernetes Secrets
#  envFromSecrets:
#    SECRET_ENV_VAR:
#      name: existing-secret-name
#      key: key-property

  service:
    type: NodePort
    port: 5162
    targetPort: 5162
    prometheus:
      enabled: false

serviceAccount:
  enabled: false

redisSecret:
  create: true

# External Secrets configuration for Snowflake user credentials
externalSecrets:
  enabled: false
  # Deploy external-secrets operator (for self-hosted mode)
  operator:
    enabled: false
  # SecretStores configuration (supports multiple AWS accounts / roles)
  # Example:
  # stores:
  #   default:
  #     type: secretsmanager
  #     region: us-east-1
  #     roleArn: arn:aws:iam::<ACCOUNT_ID>:role/YukiProxyReadKeysRole
  #   customer:
  #     type: secretsmanager
  #     region: us-east-1
  #     roleArn: arn:aws:iam::<CUSTOMER_ACCOUNT_ID>:role/YukiProxyReadKeysRole
  stores: {}
  
  # Snowflake user credentials configuration
  # Each user selects which store to use via the `store` field.
  users: []
  # Example configuration:
  # users:
  #   - username: user1
  #     store: default
  #     secretKey: /snowflake/users/user1/credentials  # Path to secret in AWS
  #     privateKeyProperty: private_key  # Property name for private key
  #     passphraseProperty: passphrase   # Optional: property name for passphrase
  #   - username: user2
  #     store: customer
  #     secretKey: /snowflake/users/user2/credentials
  #     privateKeyProperty: private_key
  #     # No passphrase for user2

# Datadog APM distributed tracing.
# Visualise the full query lifecycle as a trace tree: execute → retry → monitor → complete.
#
# Agent mode (default, agentless: false):
#   Requires a Datadog agent DaemonSet on the cluster (already present on Yuki-managed deployments).
#   Traces are sent to the agent on the node via DD_AGENT_HOST (Downward API).
#
# Agentless mode (agentless: true):
#   For self-hosted customers without a Datadog agent. Traces are sent directly to the
#   Datadog HTTP intake using the API key baked into the proxy image. No extra infrastructure needed.
#
# Sampling / cost control:
#   sampleRate: "0"  — drop all spans not matched by samplingRules (default, lowest cost).
#   sampleRate: "1.0" — trace every query (highest cost, ~$195/month at typical load).
#   samplingRules: JSON array — fine-grained rules; matched spans always get sampled regardless of sampleRate.
#   To disable tracing entirely: set enabled: false (no env vars are injected, zero overhead).
datadogApm:
  enabled: false
  # Set to true for self-hosted deployments without a Datadog agent on the cluster.
  agentless: false
  # Global fallback sample rate for spans not matched by samplingRules.
  # "0" = drop unmatched spans (recommended — only retries and failures are kept by default rules).
  # "1.0" = sample everything.
  sampleRate: "0"
  # Fine-grained sampling rules (JSON). Default: keep all retries and all failed queries.
  # Set to "" to disable rules and rely solely on sampleRate.
  samplingRules: '[{"name":"yuki.query.retry","sample_rate":1.0},{"name":"yuki.query.complete","tags":{"finalStatus":"failed"},"sample_rate":1.0}]'

hpa:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 90
  targetMemoryUtilizationPercentage: 70

ingress:
  enabled: false

resources:
  requests:
    memory: "300Mi"
    cpu: "250m"
  limits:
    memory: "600Mi"

affinity: { }
tolerations: [ ]

topologySpreadConstraints: []
# Example:
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: yuki-proxy

podDisruptionBudget:
  enabled: false
  maxUnavailable: 1
  # unhealthyPodEvictionPolicy: IfHealthyBudget  # K8s 1.27+

# Configuration for external-secrets subchart
external-secrets:
  installCRDs: true
  replicaCount: 1
  serviceAccount:
    create: true
