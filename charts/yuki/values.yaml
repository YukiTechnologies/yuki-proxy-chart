app:
  name: 'yuki-proxy'
  group: default-app-group
  replicaCount: 4
  container:
    image: 406122784773.dkr.ecr.us-east-1.amazonaws.com/yuki-proxy:0.0.408
    port: 5162
    env:
      ASPNETCORE_ENVIRONMENT: Prod
      COMPUTE_HOST: https://prod.yukicomputing.com
      SYSTEM_HOST: https://prod.yukicomputing.com
      # SERILOG_DATADOG_ENABLED is driven off observability.backend (always off).
      PROXY_HOST:
      REDIS_HOST:
      HEALTH_CHECK_REDIS_TIMEOUT_MS: 200
      HEALTH_CHECK_SYSTEM_TIMEOUT_MS: 500
      HEALTH_CHECK_COMPUTE_TIMEOUT_MS: 500

# Additional environment variables from existing Kubernetes Secrets
#  envFromSecrets:
#    SECRET_ENV_VAR:
#      name: existing-secret-name
#      key: key-property

  service:
    type: NodePort
    port: 5162
    targetPort: 5162
    prometheus:
      enabled: false

serviceAccount:
  enabled: false

redisSecret:
  create: true

# External Secrets configuration for Snowflake user credentials
externalSecrets:
  enabled: false
  # Deploy external-secrets operator (for self-hosted mode)
  operator:
    enabled: false
  # SecretStores configuration (supports multiple AWS accounts / roles)
  # Example:
  # stores:
  #   default:
  #     type: secretsmanager
  #     region: us-east-1
  #     roleArn: arn:aws:iam::<ACCOUNT_ID>:role/YukiProxyReadKeysRole
  #   customer:
  #     type: secretsmanager
  #     region: us-east-1
  #     roleArn: arn:aws:iam::<CUSTOMER_ACCOUNT_ID>:role/YukiProxyReadKeysRole
  stores: {}
  
  # Snowflake user credentials configuration
  # Each user selects which store to use via the `store` field.
  users: []
  # Example configuration:
  # users:
  #   - username: user1
  #     store: default
  #     secretKey: /snowflake/users/user1/credentials  # Path to secret in AWS
  #     privateKeyProperty: private_key  # Property name for private key
  #     passphraseProperty: passphrase   # Optional: property name for passphrase
  #   - username: user2
  #     store: customer
  #     secretKey: /snowflake/users/user2/credentials
  #     privateKeyProperty: private_key
  #     # No passphrase for user2

# Datadog APM tracing (execute → retry → monitor → complete).
# sampleRate: "0" + samplingRules = only retries/failures are traced (lowest cost).
datadogApm:
  enabled: false
  sampleRate: "0"   # "1.0" to trace everything
  samplingRules: '[{"name":"yuki.query.retry","sample_rate":1.0},{"name":"yuki.query.complete","tags":{"finalStatus":"failed"},"sample_rate":1.0}]'

hpa:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 90
  targetMemoryUtilizationPercentage: 70

proxyDeploymentType: self_hosted

ingress:
  enabled: false
  # Overrides the Ingress backend, e.g. to route to an ALB "actions." target.
  backend:
    serviceName: ""
    servicePortName: ""
    servicePortNumber: ""

# Bypass path: forwards straight to Snowflake when the proxy is unhealthy.
passthrough:
  enabled: false
  replicaCount: 2
  # Real production traffic can land here during a failover — scale it accordingly.
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  image: nginx:1.27-alpine
  # Must match app.service.port — the swapped Service's targetPort is fixed.
  # auto/forceProxy/forcePassthrough. Live-reloaded, no pod restart needed.
  mode: auto
  # Polls app's own /health/live; flips the proxy Service selector on failure.
  watcher:
    enabled: true
    image: curlimages/curl:8.11.0
    pollIntervalSeconds: 5
    failureThreshold: 3
    successThreshold: 3
    healthPath: /health/live
  # Defaults to app.container.env.PROXY_HOST.
  snowflakeHost: ""
  service:
    type: ClusterIP
  # Sized to match the main proxy — a real failover can send it full production traffic.
  resources:
    requests:
      memory: "300Mi"
      cpu: "250m"
    limits:
      memory: "600Mi"

resources:
  requests:
    memory: "300Mi"
    cpu: "250m"
  limits:
    memory: "600Mi"

affinity: { }
tolerations: [ ]

# Pin the proxy pods to specific nodes. Empty = schedule anywhere.
nodeSelector: { }

topologySpreadConstraints: []
# Example:
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: yuki-proxy

podDisruptionBudget:
  enabled: false
  maxUnavailable: 1
  # unhealthyPodEvictionPolicy: IfHealthyBudget  # K8s 1.27+

# Configuration for external-secrets subchart
external-secrets:
  installCRDs: true
  replicaCount: 1
  serviceAccount:
    create: true

# Groundcover ingestion key — set once here (or via --set / private file;
# never commit). Shared with the subchart (sensor auth) and read by the parent
# (OTLP collector Secret). Name must stay `groundcover_token` — the subchart
# reads that key.
global:
  groundcover_token: ""

# Observability backend shipped with the proxy — exactly one. Either disables
# the legacy Datadog Serilog sink (SERILOG_DATADOG_ENABLED=false).
#   groundcoverSensor: eBPF sensor (subchart); off until groundcover.enabled=true.
#   otlp:              OTel Collector that forwards OTLP to Groundcover.
observability:
  backend: groundcoverSensor

  groundcover:
    # BYOC endpoint. otlp wants the URL; the sensor subchart the bare host.
    endpoint: https://qkx2z3frg.platform.grcv.io
    # Use a Secret you manage instead of global.groundcover_token.
    existingSecret:
      name: ""
      key: INGESTION_KEY
    secretName: groundcover-ingestion-key
    envName: ""         # Groundcover env name; defaults to the release name

  otlp:
    # k8s distro has otlp/batch/otlphttp; pin >= 0.127.0 (older arm64 won't exec).
    image: otel/opentelemetry-collector-k8s:0.127.0
    replicaCount: 1
    grpcPort: 4317
    httpPort: 4318
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    configOverride: null   # full collector config object; null = chart default

# Groundcover subchart overrides (sensor backend). Passed verbatim — the parent
# can't compute these at render time. Defaults set BYOC mode (no in-cluster
# backend, ship to Yuki's Groundcover); token comes from global.groundcover_token.
groundcover:
  # Subchart toggle. The overlay sets this true (with clusterId) to deploy the
  # sensor; backend stays groundcoverSensor either way.
  enabled: false
  clusterId: yuki-proxy   # unique per install, e.g. yuki-proxy-<customer>
  env: prod
  global:
    backend:
      enabled: false      # BYOC: ship to Yuki's Groundcover, no in-cluster backend
    ingress:
      site: qkx2z3frg.platform.grcv.io   # bare host; matches observability endpoint
    # For the existing-Secret path, leave global.groundcover_token empty and set:
    # groundcoverPredefinedTokenSecret:
    #   secretName: groundcover-ingestion-key
    #   secretKey: INGESTION_KEY
  # Sensor auto-co-locates with the proxy: each pod schedules only onto a node
  # running a yuki-proxy pod (Pending elsewhere). No node labels needed.
  # Update the selector if you override app.name; set agent.affinity: {} for all nodes.
  agent:
    affinity:
      podAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: yuki-proxy
            topologyKey: kubernetes.io/hostname
  vector:
    enabled: false        # not needed in BYOC; sensor ships directly
  # k8s-watcher: REQUIRED for Groundcover to attribute traffic to workloads
  # (no enable toggle in the subchart); resources trimmed to fit small nodes.
  k8sWatcher:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

# MCP server — gated, default off; existing deployments are unchanged.
mcp:
  enabled: false
  container:
    image: ""          # set per-environment: <ecrArn>/yuki-mcp:<tag>
  baseUrl: ""          # public HTTPS URL, e.g. https://<namespace>.yukistaging.com
  platformUrl: "https://app.yukicomputing.com"  # prod default; override per-environment
  allowedRedirectUris: ""  # comma-separated; blank = allow any (dev only)
  corsAllowedOrigins: ""   # comma-separated; blank = wildcard (set explicitly in staging/prod)
  snowflakeAccount: ""     # Snowflake account id, e.g. jsjvnsg-staging
  integrationName: ""      # SystemManagement integration name for this account
  logLevel: "INFO"
  # Dedicated MCP subdomain ingress (own ALB + cert). When disabled (default),
  # MCP is path-routed (/mcp, /oauth, /register, /.well-known) on the proxy
  # ingress and baseUrl points at the proxy host. When enabled, MCP owns the
  # whole `host` subdomain — set baseUrl to https://<host> to match.
  # Full MCP host, set per-tenant; required when ingress.enabled. Convention is
  # mcp-<namespace>.<domain> (single label — the *.<domain> wildcard cert covers
  # it), e.g. mcp-jsjvnsg-prod-aws-n-virginia.yukicomputing.com. A dotted
  # mcp.<namespace>.<domain> is 2 labels deep and needs its own dedicated cert.
  host: ""
  ingress:
    enabled: false
    className: alb         # falls back to .Values.ingress.className if empty
    annotations: {}        # ALB annotations (cert-arn, load-balancer-name, external-dns hostname, healthcheck…)
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 75
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
