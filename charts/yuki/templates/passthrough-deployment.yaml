{{- if .Values.passthrough.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}-passthrough
  labels:
    app: {{ .Values.app.name }}-passthrough
    group: {{ .Values.app.group }}
spec:
  replicas: {{ .Values.passthrough.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}-passthrough
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}-passthrough
        group: {{ .Values.app.group }}
    spec:
      terminationGracePeriodSeconds: 15
      {{- if and .Values.passthrough.watcher.enabled (not .Values.passthrough.mode) }}
      {{- fail "passthrough.mode must be set (auto/forcePassthrough/forceProxy) when passthrough.watcher.enabled is true" }}
      {{- end }}
      {{- if .Values.passthrough.watcher.enabled }}
      serviceAccountName: {{ .Values.app.name }}-passthrough-watcher
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: passthrough
          image: {{ .Values.passthrough.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.app.service.port }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cache
              mountPath: /var/cache/nginx
            - name: tmp
              mountPath: /tmp
          {{- with .Values.passthrough.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.service.port }}
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.service.port }}
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 1
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
        {{- if .Values.passthrough.watcher.enabled }}
        - name: watcher
          image: {{ .Values.passthrough.watcher.image }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/etc/bypass/watch.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: watcher-config
              mountPath: /etc/bypass
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              memory: "32Mi"
        {{- end }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ .Values.app.name }}-passthrough
        - name: cache
          emptyDir:
            sizeLimit: 64Mi
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
        {{- if .Values.passthrough.watcher.enabled }}
        - name: watcher-config
          configMap:
            name: {{ .Values.app.name }}-passthrough-watcher
        {{- end }}
{{- end }}
