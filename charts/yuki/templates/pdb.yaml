{{- if .Values.podDisruptionBudget.enabled }}
{{- $minAvailable := .Values.podDisruptionBudget.minAvailable }}
{{- $maxUnavailable := .Values.podDisruptionBudget.maxUnavailable }}
{{- if and $minAvailable $maxUnavailable }}
{{- fail "podDisruptionBudget: cannot specify both minAvailable and maxUnavailable" }}
{{- end }}
{{- if not (or $minAvailable $maxUnavailable) }}
{{- fail "podDisruptionBudget: must specify either minAvailable or maxUnavailable" }}
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.app.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app: {{ .Values.app.name }}
    group: {{ .Values.app.group }}
spec:
  {{- with $minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with $maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  {{- with .Values.podDisruptionBudget.unhealthyPodEvictionPolicy }}
  unhealthyPodEvictionPolicy: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
{{- end }}
