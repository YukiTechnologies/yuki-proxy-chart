{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name | default "yuki-proxy-ingress" }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ tpl (toString $value) $ | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          {{- if .Values.mcp.enabled }}
          # MCP paths must precede / so the ALB matches them first (prefix specificity).
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: yuki-mcp
                port:
                  number: 8000
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: yuki-mcp
                port:
                  number: 8000
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: yuki-mcp
                port:
                  number: 8000
          - path: /register
            pathType: Prefix
            backend:
              service:
                name: yuki-mcp
                port:
                  number: 8000
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  number: {{ .Values.app.service.port }}
{{- end}}