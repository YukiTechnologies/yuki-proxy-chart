{{- include "proxy.observability.validate" . -}}
{{- /*
Groundcover ingestion-key Secret, shared by both observability backends:
  - otlp backend  -> the OTel collector reads it as the GROUNDCOVER_API_KEY env var
  - groundcoverSensor backend -> the subchart's groundcoverPredefinedTokenSecret points here

Only created when an inline apiKey is given and no existingSecret is referenced.
When existingSecret.name is set, that Secret is used as-is and nothing is created here.
*/ -}}
{{- if and .Values.observability.groundcover.apiKey (not .Values.observability.groundcover.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.observability.groundcover.secretName }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/version: {{ .Release.Name }}-{{ .Release.Revision }}
    app.kubernetes.io/component: observability
type: Opaque
stringData:
  INGESTION_KEY: {{ .Values.observability.groundcover.apiKey | quote }}
{{- end }}
